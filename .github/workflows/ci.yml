name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker compose build
      - name: Start services
        run: |
          docker compose up -d
          timeout 60 bash -c 'until docker compose exec -T interview-dev curl -sf http://localhost:3000/up 2>/dev/null; do sleep 3; done'
      - name: Test
        run: docker compose exec -T interview-dev ./bin/rails test
      - name: Lint
        run: docker compose exec -T interview-dev bundle exec rubocop
      - name: Typecheck
        run: docker compose exec -T interview-dev bundle exec rbs -I sig validate
      - name: Stop services
        if: always()
        run: docker compose down
