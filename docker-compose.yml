services:
  rate-api:
    image: tripladev/rate-api
    ports:
      - "8080:8080"

  interview-dev:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - .:/rails
    environment:
      - RATE_API_URL=http://rate-api:8080
      - RATE_API_TOKEN=04aa6f42aa03f220c2ae9a276cd68c62
      # OpenTelemetry is off by default. Flip OTEL_ENABLED=true and point
      # OTEL_EXPORTER_OTLP_ENDPOINT at a collector to emit traces + metrics.
      - OTEL_ENABLED=false
      # - OTEL_SERVICE_NAME=dynamic-pricing
      # - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      # - OTEL_TRACES_EXPORTER=console
    depends_on:
      - rate-api
